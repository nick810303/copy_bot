<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小泰空 Little Thai Space</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-color: #FAF8F5; /* 小泰空米色背景 */
            --primary-color: #5D4037; /* 小泰空深棕色 */
            --accent-color: #8C7355; /* 金棕色 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { text-align: center; padding: 30px; }
        .loader {
            border: 3px solid #E0D7D0;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-zh { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }
        .status-en { font-size: 0.9rem; opacity: 0.7; letter-spacing: 1px; }
        .success-icon { font-size: 50px; color: var(--accent-color); display: none; margin-bottom: 15px; }
        
        #error-ui { display: none; color: #d32f2f; }
        #fallback-box { 
            margin-top: 15px; padding: 12px; background: #FFF; border: 1px solid #DDD;
            border-radius: 8px; font-size: 0.9rem; user-select: all; word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-ui">
            <div class="loader"></div>
            <div class="status-zh">正在複製資訊...</div>
            <div class="status-en">Copying Information...</div>
        </div>

        <div id="success-ui">
            <div class="success-icon" id="check-mark">✓</div>
            <div class="status-zh">複製成功！</div>
            <div class="status-en">Copy Successful!</div>
        </div>

        <div id="error-ui">
            <div class="status-zh">複製失敗</div>
            <div class="status-en">Copy Failed</div>
            <div id="fallback-box"></div>
            <p style="font-size: 12px; margin-top: 10px;">請長按上方文字手動複製<br>Please long-press to copy</p>
        </div>
    </div>

    <script>
        // 【設定區】填入你的 LIFF ID
        const MY_LIFF_ID = "你的_LIFF_ID"; 

        async function runCopyTask() {
            try {
                // 1. 初始化 LIFF
                await liff.init({ liffId: MY_LIFF_ID });

                // 2. 解析網址參數 ?text=
                const params = new URLSearchParams(window.location.search);
                const text = params.get('text');

                if (!text) throw new Error("No text provided");

                // 3. 執行複製
                await navigator.clipboard.writeText(text);

                // 4. 顯示成功 UI
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('check-mark').style.display = 'block';
                document.getElementById('success-ui').style.display = 'block';

                // 5. 1.2 秒後自動關閉（留一點點時間讓客人看到打勾）
                setTimeout(() => { liff.closeWindow(); }, 1200);

            } catch (err) {
                console.error(err);
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('success-ui').style.display = 'none';
                document.getElementById('error-ui').style.display = 'block';
                
                const params = new URLSearchParams(window.location.search);
                document.getElementById('fallback-box').innerText = params.get('text') || "Error: No Content";
            }
        }

        window.onload = runCopyTask;
    </script>
</body>
</html>
